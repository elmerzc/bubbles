<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Bubbles</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #chat-box {
      background: #111;
      border-radius: 24px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 { color: #fff; margin-bottom: 8px; font-size: 24px; }
    #status { color: #888; margin-bottom: 24px; font-size: 14px; }
    #response {
      min-height: 80px;
      background: #0088cc;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      line-height: 1.4;
      text-align: left;
    }
    #talk-btn {
      width: 80%;
      height: 120px;
      border-radius: 16px;
      border: none;
      background: #e53935;
      color: white;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    #talk-btn:active, #talk-btn.listening {
      transform: scale(0.98);
      background: #c62828;
    }
    #talk-btn.listening {
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    #error {
      color: #ff6b6b;
      margin-top: 12px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="chat-box">
    <h1>🫧 Bubbles</h1>
    <p id="status">Ready to chat!</p>
    <div id="response">Hold the button and talk...</div>
    <button id="talk-btn">Hold to Talk</button>
    <p id="error"></p>
  </div>

  <script>
    const API_BASE = '';
    const talkBtn = document.getElementById('talk-btn');
    const status = document.getElementById('status');
    const response = document.getElementById('response');
    const errorEl = document.getElementById('error');

    let isListening = false;
    let mediaRecorder = null;
    let audioChunks = [];

    // Check mic permission on load
    async function init() {
      try {
        await navigator.mediaDevices.getUserMedia({ audio: true });
        status.textContent = 'Ready!';
      } catch (e) {
        showError('Please allow microphone access');
      }
    }
    init();

    // Use Web Speech API for TTS (free, no API needed)
    let voices = [];
    
    // Pre-created audio element that lives across interactions (needed for iOS)
    let botAudio = new Audio();
    botAudio.volume = 1.0;
    
    function base64ToBlob(base64, mimeType) {
      const byteCharacters = atob(base64);
      const byteNumbers = new Array(byteCharacters.length);
      for (let i = 0; i < byteCharacters.length; i++) {
        byteNumbers[i] = byteCharacters.charCodeAt(i);
      }
      const byteArray = new Uint8Array(byteNumbers);
      return new Blob([byteArray], { type: mimeType });
    }
    
    function playAudio(data) {
      if (!data.audio) {
        speak(data.text);
        return;
      }
      try {
        const audioBlob = base64ToBlob(data.audio, 'audio/mpeg');
        const audioUrl = URL.createObjectURL(audioBlob);
        
        // iOS requires setting src before play(), not after
        botAudio.src = audioUrl;
        botAudio.setAttribute('playsinline', '');
        
        const playPromise = botAudio.play();
        if (playPromise !== undefined) {
          playPromise.then(() => {
            console.log('Playing');
          }).catch(err => {
            console.error('Play failed:', err);
            speak(data.text);
          });
        }
      } catch (e) {
        console.error('Audio error:', e);
        speak(data.text);
      }
    }
    
    function loadVoices() {
      voices = speechSynthesis.getVoices();
    }
    
    // Wait for voices to be available
    speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();
    
    function speak(text) {
      if (!text) return;
      console.log('speak() called with:', text.substring(0, 50));
      try {
        // Remove emojis and special chars
        text = text.replace(/[\u{1F600}-\u{1F6FF}]/gu, '').replace(/[*#🎉🐰🤖🦕]/g, '');
        text = text.trim();
        if (!text) return;
        
        speechSynthesis.cancel();
        
        const utt = new SpeechSynthesisUtterance(text);
        utt.rate = 1.0;
        utt.pitch = 1.1;
        
        // Get current voices
        const allVoices = speechSynthesis.getVoices();
        console.log('Available voices:', allVoices.length);
        const enVoice = allVoices.find(v => v.lang && v.lang.startsWith('en')) || allVoices[0];
        if (enVoice) {
          utt.voice = enVoice;
          console.log('Using voice:', enVoice.name);
        } else {
          console.log('No voice found!');
        }
        
        speechSynthesis.speak(utt);
        console.log('speechSynthesis.speak() called');
      } catch (e) {
        console.error('TTS error:', e);
      }
    }

    talkBtn.addEventListener('mousedown', startListening);
    talkBtn.addEventListener('mouseup', stopListening);
    talkBtn.addEventListener('mouseleave', stopListening);
    talkBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startListening(); });
    talkBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopListening(); });
    talkBtn.addEventListener('touchcancel', stopListening);

    async function startListening() {
      if (isListening) return;
      errorEl.style.display = 'none';
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        const mimeType = MediaRecorder.isTypeSupported('audio/opus') ? 'audio/opus' : 'audio/webm';
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        
        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        
        mediaRecorder.start();
        isListening = true;
        talkBtn.classList.add('listening');
        talkBtn.textContent = 'Listening...';
        status.textContent = 'Go ahead, I\'m listening!';
        response.textContent = '';
      } catch (e) {
        showError('Could not access microphone');
      }
    }

    async function stopListening() {
      if (!isListening || !mediaRecorder) return;
      isListening = false;
      talkBtn.classList.remove('listening');
      talkBtn.textContent = 'Hold to Talk';
      status.textContent = 'Processing...';
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());

      // Wait for audio data
      const audioBlob = await new Promise(r => mediaRecorder.onstop = r);
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });

      if (blob.size < 1000) {
        status.textContent = 'Ready!';
        response.textContent = 'Hmm, I didn\'t hear anything. Try again!';
        return;
      }

      // Send to backend
      const formData = new FormData();
      formData.append('audio_file', blob, 'recording.webm');

      let data;
      try {
        const res = await fetch(`${API_BASE}/api/chat`, { 
          method: 'POST', 
          body: formData,
          credentials: 'include'
        });
        data = await res.json();
      } catch (e) {
        showError('Could not reach server. Try again!');
        return;
      }
      
      if (data.error) {
        showError(data.error);
        return;
      }
      
      response.textContent = data.text;
      status.textContent = 'Tap to chat again!';
      
      // Update session_id cookie if we got a new one
      if (data.session_id) {
        document.cookie = `session_id=${data.session_id}; path=/; max-age=31536000`;
      }
      
      // Play audio - always use MiniMax TTS
      playAudio(data);
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      status.textContent = 'Oops!';
    }
  </script>
</body>
</html>
